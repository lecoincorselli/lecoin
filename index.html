eIt/messageFr/messageIt + legacy title/message), display sceglie la lingua corrente con fallback EN; pseudo-annuncio Happy Hour anch'esso FR/IT. QC: node --check OK, runtime funzionale 55/55 (risoluzione fr/it, fallback EN admin, L/pickAnn), QC strutturale editor annunci bilanciato (23 div/14 label/4 textarea). NB: customers già in BACKUP_COLLECTIONS → campo lang incluso automaticamente. ░░ v3.0.0 — MIGRAZIONE FIREBASE: progetto lecoin-1f8a5 (account sospeso) sostituito con lecoin-f782a (account dedicato). Config aggiornata. I DATI vanno importati dal backup JSON. ATTENZIONE: il PROTECTED_ADMIN_UID va aggiornato col nuovo UID admin dopo la creazione dell account. ░░ v2.9.14 — INSTAPAY LINK IPN: nuovo campo «رابط InstaPay (ipn.eg)» nella config Instapay (instapayCfg.link, salvato in settings/instapay). Il QR di ricezione contiene un link firmato https://ipn.eg/C/Q/.../...?ISIGN=... (firma non generabile lato client → va incollato dall ufficiale). Il bottone «افتح Instapay» ora apre quel link: se ipn.eg è registrato come app-link apre InstaPay sul DESTINATARIO precompilato (importo da digitare, QR statico). Fallback intent/scheme se il link non è impostato. ░░ v2.9.13 — FIX INSTAPAY: il bottone «افتح Instapay» apriva sempre il Play Store anche con app installata. Causa: usava window.location.href=instapay:// (scheme non gestito) + setTimeout→store, quindi partiva sempre il fallback. FIX: su Android ora usa intent URL col PACKAGE (intent://#Intent;package=com.egyptianbanks.instapay;S.browser_fallback_url=STORE;end) che apre l app installata e va allo store SOLO se assente (come fa wa.me per WhatsApp). iOS/desktop mantiene scheme+fallback. ░░ v2.9.12 — SCANNER: CAUSA REALE TROVATA E CORRETTA. HTML malformato nell-intestazione dello scanner (riga ~8716): DUE </div> di troppo chiudevano il contenitore .sheet subito dopo l-header → il riquadro fotocamera #bc-reader (e il campo manuale) finivano FUORI dalla card, dietro lo sfondo sfocato dell-overlay. La fotocamera partiva davvero ma il video era renderizzato fuori vista → card con solo intestazione, nessun video. Non erano permessi/libreria/dimensioni/decoder. FIX: rimossi i due </div> errati, il pulsante × torna dentro l-header. QC strutturale (DOM, senza camera): #bc-reader + bc-msg + campo manuale ora DENTRO .sheet. ░░ v2.9.11 — SCANNER (causa trovata, indizio Dottore: rotto da quando esiste il tool video di benvenuto): su Android i decoder video hardware sono limitati; un elemento <video> non rilasciato (welcome-vid del popup, wvt-prev anteprima del tool, probe di analisi) occupa il decoder → quando lo scanner accende la camera (anch-essa un video) il riquadro resta vuoto pur con camera attiva. FIX: openScanner ora libera (pause+src vuoto+load) ogni altro <video> della pagina prima di avviare la camera, liberando il decoder. ░░ v2.9.10 — FIX: lo strumento pulizia orfani ora ha la DOPPIA conferma testuale Reset→AZZERA (case-sensitive, passo 2 sbloccato solo dopo passo 1) come tutte le operazioni distruttive, oltre a backup auto + delay 3s + confirm nativo + admin-only. Prima aveva solo confirm nativi. ░░ v2.9.9 — (A) STRUMENTO PULIZIA ORFANI: nuovo bottone «حذف المنتجات بدون فئة» nella Danger Zone (accanto a filiali fantasma): cleanOrphanProducts trova i prodotti con categoryId verso categoria inesistente e li cancella col loro magazzino. Distruttivo → backup auto + doppia conferma + admin-only + reload. (B) DIPENDENZE RESTORE GENERALIZZATE: RESTORE_DEPS + expandDeps nel ripristino a sezioni — products→categories, inventory→products+categories, offers→products+categories, loads→products+suppliers, sales/pointsLedger/orders/clientOrders→customers. Selezionando una collection si includono auto le dipendenze presenti nel backup (con avviso) + garanzia finale in execBtn. ░░ v2.9.8 — DEEP-QC RIPRISTINO (bug prodotti orfani): il ripristino a sezioni (executeSelectiveRestore) reintroduceva i prodotti scelti senza protezione di coerenza → ripristinando «المنتجات» senza «الفئات» i prodotti er barcode si apriva (camera attiva) ma non decodificava MAI nulla, su qualsiasi dispositivo/schermata. Causa: qrbox forzato a Math.max(280, 95% del lato minore) poteva superare le dimensioni reali del video → html5-qrcode blocca la decodifica. Fix: rimosso il qrbox → scansiona l-intero fotogramma (robusto per barcode prodotti 1D e QR clienti). NB: la camera non è testabile nell-ambiente QC headless — verificare dal vivo. ░░ v2.9.3 — FIX: anche gli ordini Instapay PREPAGATI passano per la coda/preparazione (prima saltavano a paid dal popup). Ora: popup → pending (per TUTTI); pesca → preparing (scala stock 1 volta); جاهز → ready; alla consegna payClientOrder mostra per i prepagati "مدفوع مسبقاً" + bottone "تأكيد الاستلام" che chiama finalizeOrderPayment (registra vendita+punti, NESSUN re-incasso). Stock scalato una sola volta (alla presa). Risolve: accettando l-ordine lo stato andava a pronto/pagato invece che in preparazione. ░░ v2.9.2 — FASE 2 VISTA CLIENTE (posizione in coda live): nella card ordine, banner di stato dinamico premium: pending+queueAhead>0 → "N طلبات قبل دورك" (numero in cerchio amber); queueAhead=0 → "أنت التالي!" (gold); preparing → "جاري تحضير طلبك الآن" (forest+chef); ready → "طلبك جاهز للاستلام" (gold). queueAhead viene scritto dal cassiere (loadPendingPoolForCassa) in ogni pending = numero di ordini in attesa DAVANTI (FIFO), letto dal cliente solo dal proprio ordine (rispetta le regole, niente accesso ad ordini altrui). Auto-refresh 20s. NB: oggi gli ordini Instapay prepagati saltano la pila; quelli cash/coperti-da-punti la attraversano. ░░ v2.9.1 — DETTAGLIO ORDINE TAP: nel Pool del cassiere, toccando la card di un ordine (area avatar+nome, con chevron) si apre uno sheet showOrderDetail con la LISTA DEGLI ARTICOLI da preparare (qty × nome + subtotale) + stato + totale + telefono. Risolve: il cassiere deve sapere COSA contiene l-ordine, non solo quanti pezzi. Il bottone azione (ابدأ التحضير/جاهز) resta separato dal tap-dettaglio. ░░ v2.9.0 — MOTORE DEL TURNO ORDINI (Fase 1, lato cassiere): attivato lo stato "preparing" (prima morto). Nuovo ciclo: pending(pila FIFO) → preparing(presa) → ready → paid. Nuova bacheca POOL nel cassiere (loadPendingPoolForCassa): zona "قيد التحضير" (bottone جاهز→ready) + zona "في الطابور" (badge numero FIFO, bottone ابدأ التحضير→preparing). La presa (pending→preparing) ora controlla e SCALA lo stock (prima avveniva a ready) + lock multi-cassiere (preparingBy; se già preso da altro cassiere avvisa). Il popup nuovo ordine (showIncomingOrder) NON salta più a ready: ora salva eventuali modifiche e lascia l-ordine in coda (pending). Eccezione invariata: ordini già pagati online (paidByClient) → finalizzati subito come prima. Fase 2 (vista cliente: posizione in coda live) come prossimo step. ░░ v2.8.7 — AGGREGATO CLASSIFICA (prerequisito sicurezza Firebase): la Sfida del Mese NON legge più tutte le fatture (sales) — ora legge un doc aggregato leggero leaderboard/{YYYY-MM} con solo {conteggio visite + primo nome} per cliente. Aggiornato a ogni vendita (cassa + ritiro ordine) via bumpMonthlyLeaderboard con increment() atomico. Così i clienti vedono la classifica SENZA accedere a importi/prodotti/prove-di-pagamento delle fatture altrui → le regole Firestore possono proteggere completamente sales/pointsLedger. Più sicuro E più efficiente (1 lettura invece di scansionare tutte le fatture). ░░ v2.8.6 — SFIDA DEL MESE (gamification): classifica LIVE nella sezione Punti, top 3 per NUMERO DI VISITE/ACQUISTI del mese corrente (conta le fatture sales del mese per customerId). Podio oro/argento/bronzo con primo nome (privacy) + numero visite; evidenzia la riga del cliente; se fuori dal podio mostra "mركزك X · باقي Z للمركز الثالث"; se senza visite invita alla prima. Countdown a fine mese. Nota "الجوائز تُعلن في البكاريا" che collega alla lavagna. Caricata con IIFE indipendente + cache sessione 120s (window._monthlyRank). Stile forest/gold premium coerente con la sezione punti. ░░ v2.8.5 — FIX COERENZA PUNTI↔FATTURE (bug punti orfani): i punti dei clienti DERIVANO dalle fatture, ma il reset center li gestiva come voci SEPARATE — cancellando solo "sales" i punti (customers.points) e il pointsLedger restavano → saldi orfani basati su fatture inesistenti (caso vissuto dal Dottore). FIX 1 (reset center): selezionare sales/pointsLedger/customers forza automaticamente "customerPoints" (azzera saldi + svuota ledger), con checkbox riflesso nella UI + avviso nel confirm. FIX 2 (field reset): f-cust-points (azzera saldo) ora svuota anche il pointsLedger, altrimenti il saldo=0 restava incoerente col ledger e col livello fedeltà (calcolato dal lifetime earned). Verificati anche: depot reset (solo inventory, nessun punto), storno/reso singolo (già revoca punti via void_revoke — corretto). PER RIPARARE LO STATO ATTUALE: aprire il reset center e selezionare "customerPoints". ░░ v2.8.4 — RIORDINA 1-TAP (Stadio 3/C): card "اطلب من جديد" in cima allo Shop (sotto il banner filiale) che mostra l&apos;ultimo ordine del cliente (nomi articoli + n. pezzi) con bottone "اطلبها مرة أخرى". Caricata in modo INDIPENDENTE dal rendering prodotti (IIFE async, non interferisce). Gli articoli sono RIMAPPATI ai prodotti CORRENTI (prezzo/nome aggiornati; salta i prodotti non più attivi o non visibili al cliente). Tap → merge nel clientCart (non perde un carrello già avviato) + apre il carrello (openClientCart). Solo cliente loggato con un ordine precedente; altrimenti card nascosta. ░░ v2.8.3 — LIVELLI FEDELTÀ (Stadio 2/B): badge Bronze/Silver/Gold in stile gesso sotto il nome, con icona trophy colorata (bronzo CD7F32 / argento BFC6CC / oro C9A84C) + nome livello + progresso "باقي X نقطة للمستوى Y" (o "أعلى مستوى" se Gold). Livello calcolato dai PUNTI GUADAGNATI NEL TEMPO (lifetime earned = somma earn - void_revoke dal pointsLedger), metrica corretta che non scende quando il cliente spende i punti. Soglie: Bronze 0-499, Silver 500-1999, Gold 2000+. Caricato nella stessa cache di sessione (60 sso periodo l&apos;anno scorso" tramite Date.setFullYear(-1), chip selector sotto al checkbox; (3) KPI hero cards premium (top 4 metriche del totale: valore corrente grande + Δ% colorato a pillola + valore precedente piccolo); (4) colonna Δ% per riga nella tabella principale (badge ▲/▼/━ a pillola, "جديد" per prodotti assenti nel periodo precedente, vuoto per sub-rows); (5) messaggio esplicito quando il confronto non è disponibile (rapporti senza riga totale come turnover). tableHtml esteso con param htmlCols (5° opzionale, retro-compatibile). i18n: compareModePrev/Yoy/New/NotAvail. ░░ v2.7.96 — Reports Hub PREMIUM icons: sostituite TUTTE le emoji della shell con icone SVG ic() (REP_SVG mappa ogni rapporto: receipt/box/coins/flame/truck/store/creditCard/building/star/clock/users/warehouse/boxes/refresh/tag/sort/bag/heart/alert/target/gem). Card griglia, titolo risultati, header periodo (clock), bottone genera (search), busy (hourglass), data risultati (calendar) — niente più emoji nelle funzioni. ░░ v2.7.95 — REDESIGN Reports Hub (shell): ricerca INTELLIGENTE con sinonimi AR+EN (REP_KW) che filtra una GRIGLIA di card rapporti responsive (auto-fill minmax 150px → 1 col mobile, più colonne tablet/PC) e premium (icona+label, selezione evidenziata forest+check), al posto del dropdown. Tap su card = seleziona + genera. Ricerca rapporti (hubState.search) separata dal filtro righe tabella (nuovo hubState.tableSearch con barra dedicata nei risultati + re-focus). Logica generate/renderResults/export/chart invariata. ░░ v2.7.94 — NUOVI RAPPORTI PRODOTTO (stadio 1/2) nel Reports Hub: Riordino (sotto-soglia per filiale + qtà suggerita da velocità×14gg), Sell-through (venduto/(stock+venduto)), Turnover (venduto/stock medio + giorni per esaurire), Redditività (profitto + % contributo al profitto totale). Costruiti in buildReportData con soldMap/purMap/stockMap già esistenti, registrati nel return e nel registro REPORTS. Stadio 2 in arrivo: scheda movimenti, storico prezzi, confronto periodi, frequenza riordino. ░░ v2.7.93 — REGOLA NESSUNA CASSA IN NEGATIVO (scelta Dottore: blocco totale, nessuna eccezione): _confirmIfOverdraw ora BLOCCA (toast treInsufficient + return false) invece di confermare → tutte le uscite che la usano (finanziamento HQ, consolidamento filiale, uscita cassa, dotazione custodia, cassiere prendi-dal-fronte, prelievo capitale) sono bloccate sotto-zero. Aggiunto blocco mancante a PAGAMENTO FORNITORE (saldo via _currentTreasury) e RICEZIONE MERCE pagata (saldo affidabile on-demand via _cashAvailFor: branch=branchCashAvailable, hq=carica cashMovements+investments). Custodia cassiere già protetta (return/liquidation). ░░ v2.7.92 — DECIMALI SOLDI INTELLIGENTI: fmt ora mostra 0 decimali se il valore è intero, esattamente 2 decimali se ha parte frazionaria (15→15, 15.5→15.50, 15.55→15.55). Copre TUTTI i punti-soldi del sito in un colpo (prezzi, totali, tesoreria, report, punti-valore). Percentuali con fmt protette con Math.round (discountPct, pct) per restare intere. egpPerPoint (soldi) spostato da fmt2 a fmt. Quantità/punti interi invariati. ░░ v2.7.91 — Upload video benvenuto: analisi+anteprima PLUS upload su Firebase Storage (welcome/welcome.mp4) + URL salvata in Firestore settings/welcomeVideo. showWelcomeVideo ora async: legge URL da Firestore, fallback ./welcome.mp4. _wvtDoUpload: uploadBytesResumable con progress bar live + getDownloadURL + setDoc. VINCOLO DEPLOY: Firebase Storage deve essere abilitato nel progetto lecoin-1f8a5 con rules che permettono write agli admin autenticati. ░░ v2.7.90 — Strumento (admin, in Gestione) "فيديو الترحيب": upload video locale → legge metadati (dimensioni, ratio, peso, durata), verdetti a pillola colorati, anteprima in mock telefono 9:19.5 con toggle ملء/كامل (cover/contain) per vedere bande vs taglio, e specifiche target (1080×1920 9:16, ≤800KB, 5-12s, MP4 muto). Nessuna transcodifica (limite browser): solo analisi+guida in locale, niente upload. ░░ v2.7.89 — Video di benvenuto: popup     nav { position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid var(--ivory-dark); z-index:40; padding-bottom:env(safe-area-inset-bottom,0); box-shadow:0 -2px 12px rgba(0,0,0,0.06); }

    .overlay { position:fixed; inset:0; background:rgba(21,40,33,0.55); -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px); display:flex; align-items:flex-end; justify-content:center; z-index:50; animation:ovFade 0.25s ease; }

    .sheet { position:relative; background:var(--ivory); border-radius:24px 24px 0 0; padding:26px 22px 22px; width:100%; max-width:480px; max-height:92vh; overflow-y:auto; animation:sheetin 0.34s cubic-bezier(0.32,0.72,0,1); box-shadow:0 -8px 40px rgba(21,40,33,0.25); }

    /* 🆕 v2.7.3 — Variante modal CENTRATO (per pagamenti/conferme): in mezzo, blur forte, animazione pop */

    /* 🆕 v2.9.6 — forza il riquadro fotocamera dello scanner a dimensioni reali: html5-qrcode dopo lo
       start inseriva il video collassandone l'altezza → camera accesa ma video invisibile, niente da leggere. */

      body { font-size:16px; }
      main { max-width:1100px; padding:22px; padding-bottom:140px !important; }
      .header-inner, .nav-inner, .cart-inner, .cart-panel { max-width:1100px; }
      .pos-grid { grid-template-columns:repeat(auto-fill,minmax(165px,1fr)); gap:14px; }
      #header-logo { height:72px !important; }
      .card { padding:22px; margin-bottom:18px; }
      .input { font-size:15px; padding:13px 16px; min-height:48px; }
      .btn-forest, .btn-gold, .btn-secondary { min-height:48px; font-size:15px; padding:14px 22px; }
      .nav-btn .ico { font-size:26px; }
      .nav-btn .lbl2 { font-size:12px; }
      .overlay.centered .sheet { max-width:640px; }
    }
    @media (min-width:1000px){ main { max-width:1200px; } .header-inner,.nav-inner{ max-width:1200px; } .overlay.centered .sheet { max-width:760px; } }
    /* قائمة الأقسام (drawer) */
    .menu-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    @media (min-width:600px){ .menu-grid { grid-template-columns:repeat(4,1fr); } }
    .menu-tile { background:var(--ivory); border:1px solid var(--ivory-dark); border-radius:16px; padding:18px 8px; display:flex; flex-direction:column; align-items:center; gap:7px; cursor:pointer; font-family:inherit; transition:transform .08s, background .15s; }
    .menu-tile:active { transform:scale(0.96); }
    .menu-tile.active { background:var(--forest); border-color:var(--forest); }
    .menu-tile.active .mt-l, .menu-tile.active .mt-i { color:#fff; }
    .menu-tile .mt-i { font-size:30px; }
    .mt-i svg { width:26px; height:26px; }
    .menu-tile .mt-l { font-size:12.5px; font-weight:700; color:var(--charcoal); text-align:center; line-height:1.2; }
    .pos-card { background:white; border-radius:14px; overflow:hidden; cursor:pointer; box-shadow:0 1px 2px rgba(0,0,0,0.04),0 4px 12px rgba(0,0,0,0.05); border:2px solid transparent; transition:border-color 0.15s; text-align:start; display:flex; flex-direction:column; }
    .pos-card:active { border-color:var(--gold); }
    .pos-card .pc-photo { width:100%; aspect-ratio:1/1; object-fit:cover; background:var(--ivory-dark); display:flex; align-items:center; justify-content:center; font-size:34px; color:rgba(26,26,26,0.3); }
    .pos-card .pc-body { padding:8px 10px 10px; }
    .pos-card .pc-name { font-size:14px; font-weight:500; line-height:1.2; }
    .pos-card .pc-desc { font-size:11px; color:rgba(26,26,26,0.55); margin-top:2px; min-height:14px; line-height:1.3; }
    .pos-card .pc-price { font-weight:700; color:var(--forest); margin-top:5px; }
    .pos-card .pc-badge { display:inline-block; margin-top:4px; font-size:10px; padding:1px 6px; border-radius:6px; background:rgba(192,72,72,0.12); color:var(--red); }
    /* 🆕 v2.7.2 — Badge offerta/novità sulla foto del prodotto */
    .pc-badge-tag { position:absolute; z-index:2; font-size:10.5px; font-weight:800; padding:3px 7px; border-radius:10px; white-space:nowrap; line-height:1.2; box-shadow:0 2px 6px rgba(0,0,0,0.18); letter-spacing:0.2px; }
    .pc-badge-offer { background:linear-gradient(135deg,#FF6B35,#FF4500); color:#fff; }
    .pc-badge-new { background:linear-gradient(135deg,var(--forest),#2A5C40); color:#fff; }
    /* CART bar */
    .cart-bar { position:fixed; bottom:62px; left:0; right:0; z-index:35; padding:0 12px; pointer-events:none; }
    .cart-inner { max-width:900px; margin:0 auto; background:var(--forest); color:var(--ivory); border-radius:14px; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 8px 28px rgba(0,0,0,0.28); pointer-events:auto; cursor:pointer; }
    .cart-panel { max-width:900px; margin:0 auto; background:var(--ivory); border-radius:16px 16px 0 0; box-shadow:0 -8px 30px rgba(0,0,0,0.22); pointer-events:auto; overflow:hidden; border:1px solid var(--ivory-dark); }
    .cart-panel-head { background:var(--forest); color:var(--ivory); padding:10px 16px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
    .cart-panel-items { max-height:38vh; overflow-y:auto; padding:4px 14px; }
    .cart-mini-line { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--ivory-dark); }
    .cart-count { background:var(--gold); color:var(--forest-dark); border-radius:999px; min-width:24px; height:24px; padding:0 7px; display:inline-flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; }
    /* cart sheet rows */
    .cart-line { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--ivory-dark); }
    .cart-line .cl-photo { width:44px; height:44px; border-radius:8px; object-fit:cover; background:var(--ivory-dark); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:18px; }
    .qty-ctrl { display:flex; align-items:center; gap:8px; }
    .qty-btn { width:30px; height:30px; border-radius:8px; border:1px solid var(--ivory-dark); background:white; font-size:18px; font-weight:700; cursor:pointer; color:var(--forest); display:flex; align-items:center; justify-content:center; }
    .pos-cat-bar { display:flex; gap:8px; overflow-x:auto; padding-bottom:8px; margin-bottom:10px; -webkit-overflow-scrolling:touch; }
    .pos-cat-chip { white-space:nowrap; padding:7px 14px; border-radius:999px; border:1px solid var(--ivory-dark); background:white; font-size:13px; font-weight:600; cursor:pointer; color:rgba(26,26,26,0.6); font-family:inherit; }
    .pos-cat-chip.active { background:var(--forest); color:var(--ivory); border-color:var(--forest); }
  </style></head>
<body>
